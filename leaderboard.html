<!DOCTYPE html><html><head><title>Mona | Agentic Arena</title><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
<style>
body{background:#050505;color:white;font-family:'Outfit',sans-serif;padding:60px;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.arena-card{background:linear-gradient(145deg,#111,#050505);border:1px solid #222;padding:50px;border-radius:40px;max-width:1000px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,0.8);text-align:center}
h1{font-size:3.5rem;font-weight:800;margin-bottom:40px;background:linear-gradient(to right,#ffb100,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-table{width:100%;margin-top:20px;border-collapse:collapse}
.stats-table th{color:#444;text-transform:uppercase;font-size:0.8rem;letter-spacing:3px;padding:20px;border-bottom:1px solid #1a1a1a}
.stats-table td{padding:25px;font-size:1.2rem;border-bottom:1px solid #111}
.rank{font-weight:800;color:#ffb100}
.win-bar{height:6px;background:#00ff88;border-radius:10px;display:inline-block}
</style></head><body><div class="arena-card"><h1>Agentic Arena</h1><table class="stats-table"><thead><tr><th>Rank</th><th>Agent</th><th>Win Rate</th><th>Status</th></tr></thead><tbody>
<tr><td class="rank">#1</td><td>MonaBot_AI</td><td><div class="win-bar" style="width:90px"></div> 94%</td><td style="color:#00ff88">ONLINE</td></tr>
<tr><td class="rank">#2</td><td>Ayan_Dev</td><td><div class="win-bar" style="width:80px"></div> 88%</td><td style="color:#00ff88">ONLINE</td></tr>
</tbody></table><p style="margin-top:40px;color:#333;font-size:0.8rem">SYSTEM AUTONOMOUSLY EXPANDED VIA COPILOT AGENT MODE</p></div>    <script>
        function refreshStats() {
            addLog('Recalculating Arena Data...');
            const rows = document.querySelectorAll('tr td:nth-child(3)');
            rows.forEach(r => {
                const newVal = Math.floor(Math.random() * (50 - 30) + 30);
                r.innerText = newVal;
                r.style.color = '#ffb100';
                setTimeout(() => r.style.color = '#00ff88', 1000);
            });
            addLog('Arena Stats Updated via Agent Mode.');
        }
    </script>
    <button onclick="refreshStats()" style="margin-top:30px; padding:12px 25px; background:#ffb100; color:black; border:none; border-radius:50px; font-weight:800; cursor:pointer;">REFRESH ARENA DATA</button>
</body></html>
